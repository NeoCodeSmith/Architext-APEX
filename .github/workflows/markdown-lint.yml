name: Markdown Lint

on:
  push:
    paths:
      - "**/*.md"
  pull_request:
    paths:
      - "**/*.md"

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules --ignore .git

      - name: Check for Windows line endings (CRLF)
        run: |
          if grep -rlI $'\r' --include="*.md" .; then
            echo "ERROR: Windows line endings (CRLF) found in markdown files. Convert to LF."
            exit 1
          fi
          echo "Line endings OK."
